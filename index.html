<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join the list.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1d1b18;
    --cream:#f6efe4;
    --rust:#b3502f;
    --line:#e2d8c6;
    --paper:#fffdf9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding:24px;
  }
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:20px;
    padding:48px 40px;
    max-width:440px;
    width:100%;
    text-align:center;
    box-shadow:0 20px 50px rgba(29,27,24,0.06);
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:1.9rem;
    margin-bottom:10px;
    line-height:1.2;
  }
  p{
    color:#6b5e51;
    font-size:0.95rem;
    margin-bottom:28px;
  }
  form{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  input[type="email"]{
    flex:1;
    min-width:180px;
    padding:13px 16px;
    border-radius:30px;
    border:1px solid var(--line);
    font-size:0.95rem;
    outline:none;
    background:var(--cream);
  }
  input[type="email"]:focus{
    border-color:var(--rust);
  }
  button{
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:30px;
    padding:13px 24px;
    font-size:0.95rem;
    font-weight:500;
    cursor:pointer;
    transition:background .15s ease;
  }
  button:hover{background:var(--rust);}
  button:disabled{opacity:0.6;cursor:not-allowed;}
  #msg{
    margin-top:18px;
    font-size:0.88rem;
    min-height:20px;
  }
  #msg.success{color:#4d6b4f;}
  #msg.error{color:var(--rust);}
</style>
</head>
<body>

<div class="card">
  <h1>Be the first to know.</h1>
  <p>Drop your email and we'll keep you posted — no spam, just the good stuff.</p>
  <form id="signup-form">
    <input type="email" id="email" placeholder="you@example.com" required>
    <button type="submit" id="submit-btn">Join</button>
  </form>
  <div id="msg"></div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = 'https://koctawglvhoqefwnjzhq.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_OSoD0kwVFWxCmaN0H6iDSQ_rW_QLw1d';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('signup-form');
  const emailInput = document.getElementById('email');
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) return;

    btn.disabled = true;
    btn.textContent = 'Joining...';
    msg.textContent = '';
    msg.className = '';

    const { error } = await supabase.from('subscribers').insert({ email });

    btn.disabled = false;
    btn.textContent = 'Join';

    if (error) {
      if (error.code === '23505') {
        msg.textContent = "You're already on the list!";
        msg.className = 'success';
      } else {
        msg.textContent = "Something went wrong. Please try again.";
        msg.className = 'error';
      }
      return;
    }

    msg.textContent = "You're in! Thanks for joining.";
    msg.className = 'success';
    form.reset();
  });
</script>

</body>
</html>
